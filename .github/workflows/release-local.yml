name: Build & Release (MiniClaw)

on:
  push:
    tags:
      - 'local-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      npm_config_fetch_retries: '5'
      npm_config_fetch_retry_factor: '2'
      npm_config_fetch_retry_mintimeout: '20000'
      npm_config_fetch_retry_maxtimeout: '120000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            jaguarclaw-ui/package-lock.json
            electron/package-lock.json

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('electron/package-lock.json') }}

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Build Vue frontend
        working-directory: jaguarclaw-ui
        run: |
          npm ci
          npm run build

      - name: Copy JAR to Electron resources
        shell: bash
        run: |
          mkdir -p electron/resources
          jar=$(ls target/*.jar | grep -v plain | grep -v original | head -1)
          cp "$jar" electron/resources/app.jar

      - name: Copy webapp to Electron resources
        shell: bash
        run: |
          rm -rf electron/resources/webapp
          cp -r jaguarclaw-ui/dist electron/resources/webapp

      - name: Copy built-in skills to Electron resources
        shell: bash
        run: |
          if [ -d .jaguarclaw/skills ]; then
            rm -rf electron/resources/skills
            cp -r .jaguarclaw/skills electron/resources/skills
          fi

      - name: Download JRE
        working-directory: electron
        run: npm run download-jre

      - name: Sync version from git tag
        working-directory: electron
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#local-v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Electron dependencies
        working-directory: electron
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt, retrying after cleanup..."
            rm -rf node_modules
            sleep 15
          done

      - name: Build and publish Electron installer (MiniClaw)
        working-directory: electron
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f .npmrc
          npx electron-builder --config builder.local.json --publish always
