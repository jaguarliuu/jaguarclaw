<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Mechanical Claw -->
  <g transform="translate(256, 256)" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center Hub -->
    <circle cx="0" cy="0" r="40" fill="white" stroke="none"/>
    
    <!-- Left Arm -->
    <path d="M-30 -20 L-80 -100 Q-120 -140 -80 -180 L-50 -150" />
    <path d="M-80 -180 Q-100 -200 -120 -160" stroke-width="24" opacity="0.8"/>
    
    <!-- Right Arm -->
    <path d="M30 -20 L80 -100 Q120 -140 80 -180 L50 -150" />
    <path d="M80 -180 Q100 -200 120 -160" stroke-width="24" opacity="0.8"/>
    
    <!-- Bottom Arm -->
    <path d="M0 40 L0 120 Q0 180 40 160" transform="rotate(180)"/> <!-- wait, this is simple -->
    <!-- Let's redraw simpler claw shape -->
  </g>
  
  <!-- Redrawing Claw Simpler -->
  <g fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top Left Finger -->
    <path d="M180 340 C140 340 120 280 140 220 L180 140" />
    <!-- Top Right Finger -->
    <path d="M332 340 C372 340 392 280 372 220 L332 140" />
    <!-- Center Mechanism -->
    <circle cx="256" cy="140" r="30" fill="white" stroke="none"/>
    <line x1="256" y1="140" x2="256" y2="80" stroke-width="20"/>
    
    <!-- Object being grabbed (small box) -->
    <rect x="216" y="340" width="80" height="80" rx="10" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  </g>
</svg>